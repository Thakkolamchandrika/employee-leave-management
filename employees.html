<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employees – LeaveTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="app-bg">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-building-check"></i><span>LeaveTrack</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a href="employees.html" class="nav-link active"><i class="bi bi-people"></i> Employees</a>
      <a href="leave.html" class="nav-link"><i class="bi bi-calendar-plus"></i> Apply Leave</a>
      <a href="requests.html" class="nav-link"><i class="bi bi-list-check"></i> Leave Requests</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <div class="topbar-title">Employees</div>
      <div class="topbar-user"><i class="bi bi-person-circle me-1"></i> Admin</div>
    </div>

    <div class="page-body">
      <div class="page-header mb-4 d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <h2 class="page-title">Manage Employees</h2>
          <p class="page-sub">Add, view, and remove employee records</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmpModal">
          <i class="bi bi-person-plus me-1"></i> Add Employee
        </button>
      </div>

      <!-- Search -->
      <div class="card-panel mb-3">
        <div class="panel-body py-2">
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search by name, department, or ID…" oninput="renderEmployees()"/>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card-panel">
        <div class="panel-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-head">
                <tr>
                  <th>Emp ID</th>
                  <th>Name</th>
                  <th>Department</th>
                  <th>Designation</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="empTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Employee Modal -->
  <div class="modal fade" id="addEmpModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold"><i class="bi bi-person-plus me-2 text-primary"></i>Add New Employee</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="empFormError" class="alert alert-danger d-none small"></div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Full Name *</label>
              <input type="text" id="empName" class="form-control" placeholder="e.g. Ravi Kumar"/>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Employee ID *</label>
              <input type="text" id="empId" class="form-control" placeholder="e.g. EMP001"/>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Department *</label>
              <select id="empDept" class="form-select">
                <option value="">Select Department</option>
                <option>Engineering</option>
                <option>Human Resources</option>
                <option>Finance</option>
                <option>Marketing</option>
                <option>Operations</option>
                <option>Sales</option>
                <option>Administration</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Designation *</label>
              <input type="text" id="empDesig" class="form-control" placeholder="e.g. Software Engineer"/>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Email *</label>
              <input type="email" id="empEmail" class="form-control" placeholder="e.g. ravi@company.com"/>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold text-muted text-uppercase">Phone</label>
              <input type="text" id="empPhone" class="form-control" placeholder="e.g. 9876543210"/>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="addEmployee()"><i class="bi bi-check2 me-1"></i>Save Employee</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <i class="bi bi-trash3 text-danger fs-1 mb-3 d-block"></i>
          <h6 class="fw-bold">Delete Employee?</h6>
          <p class="small text-muted mb-3">This will also remove all leave records for this employee.</p>
          <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    requireLogin();
    let deleteTargetId = null;

    function renderEmployees() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const employees = getEmployees().filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.dept.toLowerCase().includes(q) ||
        e.empId.toLowerCase().includes(q)
      );
      const tbody = document.getElementById('empTableBody');
      if (!employees.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4"><i class="bi bi-inbox me-2"></i>No employees found. Add one to get started.</td></tr>`;
        return;
      }
      tbody.innerHTML = employees.map(e => `
        <tr>
          <td><span class="badge bg-primary-soft text-primary">${e.empId}</span></td>
          <td><div class="d-flex align-items-center gap-2"><div class="avatar-sm">${e.name.charAt(0).toUpperCase()}</div><span class="fw-semibold">${e.name}</span></div></td>
          <td>${e.dept}</td>
          <td class="text-muted">${e.desig}</td>
          <td class="text-muted">${e.email}</td>
          <td class="text-muted">${e.phone || '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee('${e.id}')">
              <i class="bi bi-trash3"></i>
            </button>
          </td>
        </tr>`).join('');
    }

    function addEmployee() {
      const name = document.getElementById('empName').value.trim();
      const empId = document.getElementById('empId').value.trim();
      const dept = document.getElementById('empDept').value;
      const desig = document.getElementById('empDesig').value.trim();
      const email = document.getElementById('empEmail').value.trim();
      const phone = document.getElementById('empPhone').value.trim();
      const errEl = document.getElementById('empFormError');

      if (!name || !empId || !dept || !desig || !email) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.classList.remove('d-none');
        return;
      }
      errEl.classList.add('d-none');

      const employees = getEmployees();
      if (employees.find(e => e.empId === empId)) {
        errEl.textContent = 'Employee ID already exists.';
        errEl.classList.remove('d-none');
        return;
      }

      employees.push({ id: Date.now().toString(), empId, name, dept, desig, email, phone });
      saveEmployees(employees);
      bootstrap.Modal.getInstance(document.getElementById('addEmpModal')).hide();
      ['empName','empId','empDesig','empEmail','empPhone'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('empDept').value = '';
      renderEmployees();
    }

    function deleteEmployee(id) {
      deleteTargetId = id;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function confirmDelete() {
      let employees = getEmployees().filter(e => e.id !== deleteTargetId);
      saveEmployees(employees);
      let leaves = getLeaves().filter(l => l.empLocalId !== deleteTargetId);
      saveLeaves(leaves);
      bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
      renderEmployees();
    }

    renderEmployees();
  </script>
</body>
</html>
