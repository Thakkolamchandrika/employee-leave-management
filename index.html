<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ELM System – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-card shadow-lg">
    <div class="login-brand text-center mb-4">
      <div class="brand-icon mb-3">
        <i class="bi bi-building-check"></i>
      </div>
      <h1 class="brand-title">LeaveTrack</h1>
      <p class="brand-sub">Employee Leave Management System</p>
    </div>

    <div id="loginError" class="alert alert-danger d-none py-2 small" role="alert">
      <i class="bi bi-exclamation-circle me-1"></i> Invalid credentials. Try <strong>admin / admin123</strong>.
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold small text-uppercase text-muted letter-spaced">Username</label>
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
        <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username"/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold small text-uppercase text-muted letter-spaced">Password</label>
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
        <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password"/>
        <button class="btn btn-outline-secondary" type="button" id="togglePwd" tabindex="-1">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-primary w-100 py-2 fw-semibold" onclick="doLogin()">
      Sign In <i class="bi bi-arrow-right ms-1"></i>
    </button>

    <div class="demo-hint mt-4 text-center">
      <span class="badge bg-light text-secondary border">Demo: admin / admin123</span>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    ['username','password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (u === 'admin' && p === 'admin123') {
        sessionStorage.setItem('loggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').classList.remove('d-none');
      }
    }

    if (sessionStorage.getItem('loggedIn')) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
