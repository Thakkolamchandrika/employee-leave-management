<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave Requests – LeaveTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="app-bg">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="bi bi-building-check"></i><span>LeaveTrack</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a href="employees.html" class="nav-link"><i class="bi bi-people"></i> Employees</a>
      <a href="leave.html" class="nav-link"><i class="bi bi-calendar-plus"></i> Apply Leave</a>
      <a href="requests.html" class="nav-link active"><i class="bi bi-list-check"></i> Leave Requests</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <div class="topbar-title">Leave Requests</div>
      <div class="topbar-user"><i class="bi bi-person-circle me-1"></i> Admin</div>
    </div>

    <div class="page-body">
      <div class="page-header mb-4">
        <h2 class="page-title">Leave Requests</h2>
        <p class="page-sub">Review, approve, or reject employee leave applications</p>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs mb-3">
        <button class="filter-tab active" onclick="setFilter('All', this)">All</button>
        <button class="filter-tab" onclick="setFilter('Pending', this)">Pending</button>
        <button class="filter-tab" onclick="setFilter('Approved', this)">Approved</button>
        <button class="filter-tab" onclick="setFilter('Rejected', this)">Rejected</button>
      </div>

      <div class="card-panel">
        <div class="panel-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-head">
                <tr>
                  <th>Employee</th>
                  <th>Leave Type</th>
                  <th>From</th>
                  <th>To</th>
                  <th>Days</th>
                  <th>Reason</th>
                  <th>Applied On</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="requestsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold"><i class="bi bi-file-text me-2 text-primary"></i>Leave Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer border-0" id="detailFooter"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    requireLogin();
    let currentFilter = 'All';

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRequests();
    }

    function renderRequests() {
      const leaves = getLeaves().filter(l => currentFilter === 'All' || l.status === currentFilter).reverse();
      const tbody = document.getElementById('requestsBody');
      if (!leaves.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4"><i class="bi bi-inbox me-2"></i>No ${currentFilter === 'All' ? '' : currentFilter.toLowerCase()} requests found.</td></tr>`;
        return;
      }
      tbody.innerHTML = leaves.map(l => `
        <tr>
          <td class="fw-semibold">${l.empName}</td>
          <td>${l.leaveType}</td>
          <td>${formatDate(l.from)}</td>
          <td>${formatDate(l.to)}</td>
          <td><span class="badge bg-secondary-soft text-dark">${l.days}d</span></td>
          <td class="text-muted" style="max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${l.reason}">${l.reason}</td>
          <td class="text-muted small">${formatDate(l.appliedOn)}</td>
          <td><span class="badge ${statusBadge(l.status)}">${l.status}</span></td>
          <td>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-outline-secondary" onclick="viewDetail('${l.id}')" title="View"><i class="bi bi-eye"></i></button>
              ${l.status === 'Pending' ? `
              <button class="btn btn-sm btn-outline-success" onclick="updateStatus('${l.id}','Approved')" title="Approve"><i class="bi bi-check2"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="updateStatus('${l.id}','Rejected')" title="Reject"><i class="bi bi-x-lg"></i></button>` : ''}
            </div>
          </td>
        </tr>`).join('');
    }

    function updateStatus(id, status) {
      const leaves = getLeaves();
      const i = leaves.findIndex(l => l.id === id);
      if (i !== -1) { leaves[i].status = status; saveLeaves(leaves); }
      renderRequests();
    }

    function viewDetail(id) {
      const l = getLeaves().find(l => l.id === id);
      if (!l) return;
      document.getElementById('detailBody').innerHTML = `
        <div class="row g-3">
          <div class="col-6"><div class="detail-field"><div class="detail-label">Employee</div><div class="detail-val">${l.empName}</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">Leave Type</div><div class="detail-val">${l.leaveType}</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">From</div><div class="detail-val">${formatDate(l.from)}</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">To</div><div class="detail-val">${formatDate(l.to)}</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">Duration</div><div class="detail-val">${l.days} day(s)</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">Applied On</div><div class="detail-val">${formatDate(l.appliedOn)}</div></div></div>
          <div class="col-12"><div class="detail-field"><div class="detail-label">Reason</div><div class="detail-val">${l.reason}</div></div></div>
          <div class="col-6"><div class="detail-field"><div class="detail-label">Status</div><div class="detail-val"><span class="badge ${statusBadge(l.status)}">${l.status}</span></div></div></div>
        </div>`;
      const footer = document.getElementById('detailFooter');
      footer.innerHTML = l.status === 'Pending'
        ? `<button class="btn btn-success" onclick="updateStatus('${l.id}','Approved');bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide()"><i class="bi bi-check2 me-1"></i>Approve</button>
           <button class="btn btn-danger" onclick="updateStatus('${l.id}','Rejected');bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide()"><i class="bi bi-x-lg me-1"></i>Reject</button>
           <button class="btn btn-light" data-bs-dismiss="modal">Close</button>`
        : `<button class="btn btn-light" data-bs-dismiss="modal">Close</button>`;
      new bootstrap.Modal(document.getElementById('detailModal')).show();
    }

    function formatDate(d) {
      if (!d) return '—';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    }

    renderRequests();
  </script>
</body>
</html>
